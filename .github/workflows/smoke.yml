name: smoke-imports
# Imports every analysis script and harness without LFS payload to catch
# path-style regressions (e.g. hardcoded Windows paths) before they ship.
# Logic lives in scripts/ci/verify_smoke_imports.py for local debuggability.

on: [push, pull_request]

jobs:
  imports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {lfs: false}
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}

      - name: install minimal deps
        # numpy / scipy / scikit-learn are needed for module-level imports
        # in the analysis scripts. faiss is intentionally NOT installed --
        # run_calibration defers its faiss import to main(), so import-time
        # smoke does not need it. Adding faiss here would be ~80 MB of
        # download per CI run for no gain.
        run: pip install --quiet numpy scipy scikit-learn

      - name: smoke imports
        run: python scripts/ci/verify_smoke_imports.py
