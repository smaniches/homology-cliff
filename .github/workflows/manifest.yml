name: manifest-verify
# Verifies MANIFEST.sha256.json against disk content for every real
# (non-LFS-stub) tracked file, AND verifies the four pre-registration
# SHA256 locks claimed in paper abstracts. Both checks are implemented
# as standalone scripts in scripts/ci/ so they are runnable locally
# with the exact same logic CI uses.

on: [push, pull_request]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {lfs: false}
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}

      - name: verify manifest hashes against disk
        run: python scripts/ci/verify_manifest.py

      - name: verify pre-registration SHA256 locks
        run: python scripts/ci/verify_prereg_locks.py
