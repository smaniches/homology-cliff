name: tests
# Schema and invariant tests on committed cells. Runs without LFS payload
# on free open-source allowance; data-dependent tests skip cleanly when
# files are LFS pointer stubs (see tests/test_cell_schema.py for the
# graceful-skip logic). To execute the full suite, on a fresh clone:
#     git lfs pull
#     pytest tests/ -v

on: [push, pull_request]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {lfs: false}
      - uses: actions/setup-python@v5
        with: {python-version: '3.11', cache: 'pip'}

      - name: install minimal test deps
        run: pip install --quiet numpy scipy pytest

      - name: pytest with skip-summary
        # -rs prints the skip reasons in the summary so reviewers see
        # exactly which tests are data-dependent and why they skipped.
        run: pytest tests/ -v --tb=short -rs
